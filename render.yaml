services:
  - type: web
    name: meowtetr-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build && npx prisma generate && npx prisma db push
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: "4000"
